version: '3'

services:
  # App de Payload CMS (Entorno de Desarrollo)
  payload:
    image: oven/bun:1.3.13-alpine
    ports:
      - '3050:3050'
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app
    command: sh -c "bun install && bun run dev"
    env_file:
      - .env

volumes:
  node_modules:

